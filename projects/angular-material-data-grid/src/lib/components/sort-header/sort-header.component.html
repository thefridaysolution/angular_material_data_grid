<div class="amdg-layout-container" [ngStyle]="{'cursor': heading.disableSorting ? 'default': 'pointer'}" matRipple [matRippleDisabled]="heading.disableSorting" (click)="sort()">
  <span id="amdg-header-text" class="amdg-text-truncate" [matTooltip]="heading.headerTooltip"> {{heading.display}}</span>
  @if (!heading.disableSorting) {
    @if (!heading.sort) {
      <mat-icon   class="amdg-sort-icon" matTooltip="Sort Ascending">sort</mat-icon>
    }
    @if (heading.sort === 'asc') {
      <mat-icon  color="accent" matTooltip="Sort Descending">arrow_upward</mat-icon>
    }
    @if (heading.sort === 'desc') {
      <mat-icon color="accent" matTooltip="Remove Sort">arrow_downward</mat-icon>
    }
  }
</div>
